name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Sync
        run: uv sync --all-extras
      - name: Test
        run: uv run python -m pytest
      - name: Type check
        run: uv run pyright
      - name: Build
        run: uv build
      - name: Publish to PyPI
        run: uv publish --trusted-publishing always
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --notes "Initial civec release."
